<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BattleChat Live</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #000; color: #fff; height: 1080px; display: flex; overflow: hidden; }
    #battle { width: 1600px; height: 1080px; position: relative; display: flex; justify-content: center; align-items: center; background: #111; }
    .video-container { position: relative; width: 45%; height: 80%; text-align: center; }
    video { width: 100%; height: 100%; object-fit: cover; border: 3px solid #444; }
    .username-label { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 8px 16px; font-weight: bold; border-radius: 6px; font-size: 20px; width: max-content; }
    #timer { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: #222; padding: 15px 30px; font-size: 32px; border: 3px solid #f00; border-radius: 10px; z-index: 10; }
    #vote-bar { position: absolute; bottom: 20px; left: 10%; right: 10%; height: 30px; background: #333; border: 2px solid #555; border-radius: 4px; overflow: hidden; display: flex; }
    #vote-left { height: 100%; background: #0c0; width: 50%; transition: width 0.5s; }
    #vote-right { height: 100%; background: #c00; width: 50%; transition: width 0.5s; }
    #votes { position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%); display: flex; gap: 60px; }
    .vote-btn { font-size: 48px; background: none; border: none; cursor: pointer; color: #ddd; }
    .vote-btn:hover { color: #ff0; transform: scale(1.1); }
    #chat { width: 320px; height: 1080px; background: #1a1a1a; display: flex; flex-direction: column; border-left: 2px solid #333; }
    #messages { flex: 1 1 auto; overflow-y: auto; padding: 10px; margin: 0; list-style: none; display: flex; flex-direction: column; }
    #messages li { padding: 8px 0; border-bottom: 1px solid #222; font-size: 14px; display: flex; justify-content: space-between; align-items: flex-start; }
    #messages .msg-content { flex: 1; word-wrap: break-word; }
    #messages .timestamp { font-size: 10px; color: #888; margin-left: 10px; white-space: nowrap; text-align: right; min-width: 120px; }
    #send-message { flex-shrink: 0; padding: 10px; background: #111; border-top: 1px solid #333; }
    #chat-txt { width: calc(100% - 20px); padding: 10px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; }
    #send-message button { width: 100%; padding: 10px; background: #004; color: #fff; border: none; cursor: pointer; border-radius: 4px; margin-top: 8px; }
    #queueBtn { position: absolute; top: 100px; left: 20px; padding: 12px 24px; background: #800; color: #fff; border: none; font-size: 16px; cursor: pointer; border-radius: 6px; z-index: 10; }
  </style>
</head>
<body>
  <div id="battle">
    <button id="queueBtn">Queue for Battle</button>
    
    <div class="video-container" id="leftVideoContainer">
      <div class="username-label" id="leftUsername">Waiting...</div>
      <video id="leftVideo" autoplay playsinline muted></video>
    </div>
    
    <div class="video-container" id="rightVideoContainer">
      <div class="username-label" id="rightUsername">Waiting...</div>
      <video id="remoteVideo" autoplay playsinline></video>
    </div>
    
    <div id="timer">TIME REMAINING: 2:00</div>
    
    <div id="votes">
      <button class="vote-btn" id="voteLeft">❤️</button>
      <button class="vote-btn" id="voteRight">❤️</button>
    </div>
    
    <div id="vote-bar">
      <div id="vote-left"></div>
      <div id="vote-right"></div>
    </div>
  </div>
  
  <div id="chat">
    <ul id="messages"></ul>
    <form id="send-message">
      <input id="chat-txt" type="text" placeholder="Type your message...">
      <button type="submit">Send</button>
    </form>
  </div>

  <!-- Firebase compat SDK (update with your latest from console) -->
  <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore-compat.js"></script>

  <script>
    // Your Firebase config (from console)
    const firebaseConfig = {
      apiKey: "AIzaSyDHydpS4DNnD03DJ201vW9fWamLOlDbxkc",
      authDomain: "battlechat-7e251.firebaseapp.com",
      databaseURL: "https://battlechat-7e251-default-rtdb.firebaseio.com/",
      projectId: "battlechat-7e251",
      storageBucket: "battlechat-7e251.firebasestorage.app",
      messagingSenderId: "201655683009",
      appId: "1:201655683009:web:2e9e45b1c8097a56ab9140",
      measurementId: "G-V6MX9ZKRCX"
    };

    // Initialize Firebase (compat style)
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const firestore = firebase.firestore();

    // Username validation
    let username = prompt("Pick a username (3-20 characters):");
    while (!username || username.length < 3 || username.length > 20) {
      alert("Username must be 3-20 characters.");
      username = prompt("Pick a username (3-20 characters):");
    }

    // Community chat with timestamps (local timezone)
    document.getElementById("send-message").addEventListener("submit", (e) => {
      e.preventDefault();
      const msg = document.getElementById("chat-txt").value.trim();
      if (!msg) return;
      const ts = Date.now();
      db.ref("messages/" + ts).set({ usr: username, msg, ts });
      document.getElementById("chat-txt").value = "";
    });

    db.ref("messages/").on("child_added", (snap) => {
      const data = snap.val();
      const li = document.createElement("li");
      const localTime = new Date(data.ts).toLocaleString('en-US', { month: 'numeric', day: 'numeric', year: 'numeric', hour: 'numeric', minute: 'numeric', hour12: true });
      li.innerHTML = `<span class="msg-content"><strong>${data.usr}:</strong> ${data.msg}</span><span class="timestamp">${localTime}</span>`;
      document.getElementById("messages").appendChild(li);
      const chat = document.getElementById("chat");
      chat.scrollTop = chat.scrollHeight;
    });

    // WebRTC config
    const iceConfig = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };
    let peerConn, localStream, isInBattle = false;
    const roomId = 'main-battle-room'; // One big room
    const roomRef = firestore.collection('rooms').doc(roomId);
    const battleStateRef = db.ref('battleState');
    const queueRef = db.ref('queue');

    // Queue button: Add to queue
    document.getElementById("queueBtn").addEventListener("click", async () => {
      queueRef.push(username);
      alert('Added to queue! Waiting for your turn...');
    });

    // Listen for battle state changes
    battleStateRef.on('value', async (snap) => {
      const state = snap.val() || { winner: null, challenger: null, votesWinner: 0, votesChallenger: 0, timerStart: 0 };
      document.getElementById("leftUsername").textContent = state.winner || 'Waiting...';
      document.getElementById("rightUsername").textContent = state.challenger || 'Waiting...';

      updateVoteBar(state.votesWinner, state.votesChallenger);

      if (state.winner && state.challenger && Date.now() - state.timerStart < 120000) {
        updateTimer(state.timerStart);
      } else {
        document.getElementById("timer").textContent = 'TIME REMAINING: 2:00';
      }

      // If this user is assigned to battle
      if ((state.winner === username || state.challenger === username) && !isInBattle) {
        isInBattle = true;
        await startBattleStream(state.winner === username);
      } else if (isInBattle && state.winner !== username && state.challenger !== username) {
        isInBattle = false;
        stopStream();
      }
    });

    async function startBattleStream(isWinner) {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        const localVideo = document.getElementById(isWinner ? "leftVideo" : "remoteVideo");
        localVideo.srcObject = localStream;

        peerConn = new RTCPeerConnection(iceConfig);
        localStream.getTracks().forEach(t => peerConn.addTrack(t, localStream));

        if (isWinner) {
          const offer = await peerConn.createOffer();
          await peerConn.setLocalDescription(offer);
          await roomRef.update({ offer: { type: offer.type, sdp: offer.sdp } });
          roomRef.onSnapshot(s => {
            const d = s.data();
            if (d?.answer && !peerConn.currentRemoteDescription) {
              peerConn.setRemoteDescription(new RTCSessionDescription(d.answer));
            }
          });
          collectCandidates("callerCandidates", "calleeCandidates");
        } else {
          const snap = await roomRef.get();
          await peerConn.setRemoteDescription(new RTCSessionDescription(snap.data().offer));
          const ans = await peerConn.createAnswer();
          await peerConn.setLocalDescription(ans);
          await roomRef.update({ answer: { type: ans.type, sdp: ans.sdp } });
          collectCandidates("calleeCandidates", "callerCandidates");
        }

        peerConn.ontrack = e => {
          const remoteVideo = document.getElementById(isWinner ? "remoteVideo" : "leftVideo");
          remoteVideo.srcObject = e.streams[0];
        };
      } catch (err) {
        console.error("Error starting stream:", err);
      }
    }

    function stopStream() {
      if (localStream) localStream.getTracks().forEach(t => t.stop());
      if (peerConn) peerConn.close();
      document.getElementById("leftVideo").srcObject = null;
      document.getElementById("remoteVideo").srcObject = null;
    }

    function collectCandidates(localName, remoteName) {
      const coll = roomRef.collection(localName);
      peerConn.addEventListener('icecandidate', ev => {
        if (ev.candidate) coll.add(ev.candidate.toJSON());
      });
      roomRef.collection(remoteName).onSnapshot(s => {
        s.docChanges().forEach(ch => {
          if (ch.type === "added") peerConn.addIceCandidate(new RTCIceCandidate(ch.doc.data()));
        });
      });
    }

    function updateVoteBar(left, right) {
      const total = left + right || 1;
      document.getElementById("vote-left").style.width = `${(left / total * 100)}%`;
      document.getElementById("vote-right").style.width = `${(right / total * 100)}%`;
    }

    let timerInterval;
    function updateTimer(startTime) {
      clearInterval(timerInterval);
      let secs = 120 - Math.floor((Date.now() - startTime) / 1000);
      timerInterval = setInterval(() => {
        secs--;
        if (secs < 0) {
          clearInterval(timerInterval);
          return;
        }
        const m = Math.floor(secs / 60);
        const s = secs % 60;
        document.getElementById("timer").textContent = `TIME REMAINING: ${m}:${s < 10 ? '0' : ''}${s}`;
      }, 1000);
    }

    // Votes
    document.getElementById("voteLeft").onclick = () => battleStateRef.update({ votesWinner: firebase.database.ServerValue.increment(1) });
    document.getElementById("voteRight").onclick = () => battleStateRef.update({ votesChallenger: firebase.database.ServerValue.increment(1) });

    // Manage queue and battle (server-like logic in client, but synchronized)
    queueRef.on('value', async (snap) => {
      const queue = snap.val() || {};
      const queueList = Object.values(queue);
      battleStateRef.once('value').then(async (battleSnap) => {
        const state = battleSnap.val() || { winner: null, challenger: null, votesWinner: 0, votesChallenger: 0, timerStart: 0 };

        if (queueList.length >= 2 && !state.winner && !state.challenger) {
          // Start new battle
          const [newWinner, newChallenger] = queueList.splice(0, 2);
          await battleStateRef.set({ winner: newWinner, challenger: newChallenger, votesWinner: 0, votesChallenger: 0, timerStart: Date.now() });
          queueRef.set(queueList.reduce((acc, usr, i) => ({ ...acc, [i]: usr }), {}));
          setTimeout(endBattle, 120000);
        } else if (queueList.length >= 1 && state.winner && !state.challenger) {
          // Add next challenger
          const newChallenger = queueList.shift();
          await battleStateRef.update({ challenger: newChallenger, votesWinner: 0, votesChallenger: 0, timerStart: Date.now() });
          queueRef.set(queueList.reduce((acc, usr, i) => ({ ...acc, [i]: usr }), {}));
          setTimeout(endBattle, 120000);
        }
      });
    });

    async function endBattle() {
      battleStateRef.once('value').then(async (snap) => {
        const state = snap.val();
        if (state.votesWinner > state.votesChallenger) {
          // Winner stays, challenger kicked
          await battleStateRef.update({ challenger: null, votesWinner: 0, votesChallenger: 0 });
        } else {
          // Challenger wins, becomes winner, old winner kicked
          await battleStateRef.update({ winner: state.challenger, challenger: null, votesWinner: 0, votesChallenger: 0 });
        }
      });
    }
  </script>
</body>
</html>
