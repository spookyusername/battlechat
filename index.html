<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BattleChat Live</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Username Selection Overlay -->
    <div id="username-overlay" class="overlay">
        <div class="bubble">
            <h2>PICK A USERNAME</h2>
            <input type="text" id="username-input" placeholder="Enter username..." maxlength="15">
            <button id="join-btn">JOIN</button>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="app-container" class="hidden">
        <div class="video-grid">
            <div class="video-container" id="player1-container">
                <div class="stream-info">
                    <h2 class="username" id="p1-username">WAITING...</h2>
                    <div class="stats" id="p1-stats">
                        <span class="label">WINSTREAK</span>
                        <span class="value" id="p1-streak">0</span>
                    </div>
                </div>
                <video id="p1Video" autoplay muted playsinline></video>
                <button class="vote-btn" id="vote-p1">VOTE P1</button>
            </div>

            <div class="video-container" id="player2-container">
                <div class="stream-info">
                    <h2 class="username" id="p2-username">WAITING...</h2>
                    <div class="stats" id="p2-stats">
                        <span class="label">WINSTREAK</span>
                        <span class="value" id="p2-streak">0</span>
                    </div>
                </div>
                <video id="p2Video" autoplay playsinline></video>
                <button class="vote-btn" id="vote-p2">VOTE P2</button>
            </div>

            <div class="battle-status" id="battle-status">
                <div class="timer" id="timer">2:00</div>
            </div>
        </div>

        <div class="sidebar">
            <button id="queue-btn" class="action-btn">JOIN BATTLE CHAT QUEUE</button>

            <div class="chat-container">
                <div class="chat-messages" id="chat-messages">
                    <div class="message system">Welcome to BattleChat Live!</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="type MESSAGE...">
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js';
      import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js';
      import { getDatabase, ref, set, onValue, push, remove, serverTimestamp, get } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js';

      const firebaseConfig = {
        apiKey: "AIzaSyDwudK0Z8VPQh4okgzAXBpq1BQJwRqiDTI",
        authDomain: "battlechat-e988c.firebaseapp.com",
        databaseURL: "https://battlechat-e988c-default-rtdb.firebaseio.com",
        projectId: "battlechat-e988c",
        storageBucket: "battlechat-e988c.firebasestorage.app",
        messagingSenderId: "57130292781",
        appId: "1:57130292781:web:586bcfc01bca236e820aa4"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getDatabase(app);

      window.firebaseAuth = auth;
      window.firebaseDb = db;
      window.firebaseRef = ref;
      window.firebaseSet = set;
      window.firebaseOnValue = onValue;
      window.firebasePush = push;
      window.firebaseRemove = remove;
      window.firebaseServerTimestamp = serverTimestamp;
      window.firebaseSignInAnonymously = signInAnonymously;
      window.firebaseGet = get;

      console.log("Firebase loaded OK");
    </script>

    <script src="app.js"></script>
</body>
</html>
