<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BattleChat Live</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Roboto:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Username Selection Overlay -->
    <div id="username-overlay" class="overlay">
        <div class="bubble">
            <h2>PICK A USERNAME</h2>
            <input type="text" id="username-input" placeholder="Enter username..." maxlength="15">
            <button id="join-btn">JOIN</button>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="app-container" class="hidden">

        <!-- Video Grid -->
        <div class="video-grid">
            <!-- Player 1 (Left) -->
            <div class="video-container" id="player1-container">
                <div class="stream-info">
                    <h2 class="username" id="p1-username">WAITING...</h2>
                    <div class="stats hidden" id="p1-stats">
                        <span class="label">WINSTREAK</span>
                        <span class="value" id="p1-streak">0</span>
                    </div>
                </div>
                <!-- Video Element -->
                <video id="localVideo" autoplay muted playsinline></video>
                <!-- Vote Button Overlay -->
                <button class="vote-btn hidden" id="vote-p1">VOTE P1</button>
            </div>

            <!-- Player 2 (Right) -->
            <div class="video-container" id="player2-container">
                <div class="stream-info">
                    <h2 class="username" id="p2-username">WAITING...</h2>
                    <div class="stats hidden" id="p2-stats">
                        <span class="label">WINSTREAK</span>
                        <span class="value" id="p2-streak">0</span>
                    </div>
                </div>
                <!-- Video Element -->
                <video id="remoteVideo" autoplay playsinline></video>
                <!-- Vote Button Overlay -->
                <button class="vote-btn hidden" id="vote-p2">VOTE P2</button>
            </div>

            <!-- Timer / Status Overlay (Center) -->
            <div class="battle-status hidden" id="battle-status">
                <div class="timer" id="timer">2:00</div>
            </div>
        </div>

        <!-- Sidebar (Chat & Queue) -->
        <div class="sidebar">
            <button id="queue-btn" class="action-btn">JOIN BATTLE CHAT QUEUE</button>

            <div class="chat-container">
                <div class="chat-messages" id="chat-messages">
                    <!-- Messages will appear here -->
                    <div class="message system">Welcome to BattleChat Live!</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="type MESSAGE...">
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
