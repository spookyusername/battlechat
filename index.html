<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BattleChat Live</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Username Selection Overlay -->
    <div id="username-overlay" class="overlay">
        <div class="bubble">
            <h2>PICK A USERNAME</h2>
            <input type="text" id="username-input" placeholder="Enter username..." maxlength="15">
            <button id="join-btn">JOIN</button>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="app-container" class="hidden">

        <!-- Video Grid -->
        <div class="video-grid">
            <!-- Streamer -->
            <div class="video-container" id="streamer-container">
                <div class="stream-info">
                    <h2 class="username" id="streamer-username">WAITING...</h2>
                </div>
                <!-- Video Element -->
                <video id="streamerVideo" autoplay muted playsinline></video>
            </div>

            <!-- Status Overlay (Center) -->
            <div class="battle-status" id="battle-status">
                <div class="timer" id="timer">LIVE</div>
            </div>
        </div>

        <!-- Sidebar (Chat & Queue) -->
        <div class="sidebar">
            <button id="queue-btn" class="action-btn">JOIN QUEUE TO GO LIVE</button>

            <div class="chat-container">
                <div class="chat-messages" id="chat-messages">
                    <!-- Messages will appear here -->
                    <div class="message system">Welcome to BattleChat Live!</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="type MESSAGE...">
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase Modular SDK (CDN) - Loads first so app.js can use it -->
    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
      import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
      import { getDatabase, ref, set, onValue, push, remove, serverTimestamp, get, query, orderByChild, startAt, onChildAdded } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

      // === PASTE YOUR REAL FIREBASE CONFIG HERE ===
      const firebaseConfig = {
        apiKey: "AIzaSyDwudK0Z8VPQh4okgzAXBpq1BQJwRqiDTI",
        authDomain: "battlechat-e988c.firebaseapp.com",
        databaseURL: "https://battlechat-e988c-default-rtdb.firebaseio.com",
        projectId: "battlechat-e988c",
        storageBucket: "battlechat-e988c.firebasestorage.app",
        messagingSenderId: "57130292781",
        appId: "1:57130292781:web:586bcfc01bca236e820aa4"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getDatabase(app);

      // Expose to global scope for app.js
      window.firebaseAuth = auth;
      window.firebaseDb = db;
      window.firebaseRef = ref;
      window.firebaseSet = set;
      window.firebaseOnValue = onValue;
      window.firebasePush = push;
      window.firebaseRemove = remove;
      window.firebaseServerTimestamp = serverTimestamp;
      window.firebaseSignInAnonymously = signInAnonymously;
      window.firebaseGet = get;
      window.firebaseQuery = query;
      window.firebaseOrderByChild = orderByChild;
      window.firebaseStartAt = startAt;
      window.firebaseOnChildAdded = onChildAdded;

      console.log("Firebase v10.12.0 modular loaded OK");
    </script>

    <script src="app.js"></script>
</body>
</html>
</DOCUMENT>
